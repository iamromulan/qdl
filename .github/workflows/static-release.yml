name: Static Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-static:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            build-base \
            git \
            libxml2-dev \
            libusb-dev \
            zlib-static \
            xz-dev \
            pkgconf \
            linux-headers \
            eudev-dev

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build static binary
        run: |
          # Build with static linking - need to add all transitive dependencies
          STATIC_LIBS=$(pkg-config --libs --static libxml-2.0 libusb-1.0)
          echo "Static libs: $STATIC_LIBS"
          make LDFLAGS="-static $STATIC_LIBS -ludev -lpthread"

      - name: Verify static linking
        run: |
          file qdl
          ldd qdl 2>&1 | grep -q "Not a valid dynamic program" || ldd qdl 2>&1 | grep -q "statically linked" && echo "Static binary confirmed"

      - name: Run tests
        run: make tests

      - name: Package
        run: |
          mkdir -p dist
          cp qdl qdl-ramdump ks dist/
          cd dist && tar -czvf ../qdl-linux-x64-static.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdl-linux-x64-static
          path: qdl-linux-x64-static.tar.gz

  build-linux-arm64-static:
    runs-on: ubuntu-24.04-arm
    container:
      image: alpine:latest
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            build-base \
            git \
            libxml2-dev \
            libusb-dev \
            zlib-static \
            xz-dev \
            pkgconf \
            linux-headers \
            eudev-dev

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build static binary
        run: |
          # Build with static linking - need to add all transitive dependencies
          STATIC_LIBS=$(pkg-config --libs --static libxml-2.0 libusb-1.0)
          echo "Static libs: $STATIC_LIBS"
          make LDFLAGS="-static $STATIC_LIBS -ludev -lpthread"

      - name: Verify static linking
        run: |
          file qdl
          ldd qdl 2>&1 | grep -q "Not a valid dynamic program" || ldd qdl 2>&1 | grep -q "statically linked" && echo "Static binary confirmed"

      - name: Run tests
        run: make tests

      - name: Package
        run: |
          mkdir -p dist
          cp qdl qdl-ramdump ks dist/
          cd dist && tar -czvf ../qdl-linux-arm64-static.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdl-linux-arm64-static
          path: qdl-linux-arm64-static.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-xz

      - name: Build
        shell: msys2 {0}
        run: |
          git config --global core.autocrlf true
          make

      - name: Verify build
        shell: msys2 {0}
        run: |
          file qdl.exe
          ./qdl.exe --version || true

      - name: Run tests
        shell: msys2 {0}
        run: make tests

      - name: Download Enigma Virtual Box
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://enigmaprotector.com/assets/files/enigmavb.exe" -OutFile "enigmavb_setup.exe"
          Start-Process -FilePath "enigmavb_setup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Bundle into single EXE
        shell: pwsh
        run: |
          $MSYS2_LOCATION = "${{ steps.msys2.outputs.msys2-location }}"
          $BIN_DIR = Join-Path $MSYS2_LOCATION "mingw64\bin"
          $BuildDir = "build"
          New-Item -ItemType Directory -Path $BuildDir | Out-Null

          # Copy required DLLs to build dir
          Copy-Item (Join-Path $BIN_DIR "zlib1.dll") $BuildDir
          Copy-Item (Join-Path $BIN_DIR "libxml2-16.dll") $BuildDir
          Copy-Item (Join-Path $BIN_DIR "libusb-1.0.dll") $BuildDir
          Copy-Item (Join-Path $BIN_DIR "liblzma-5.dll") $BuildDir
          Copy-Item (Join-Path $BIN_DIR "libiconv-2.dll") $BuildDir

          # Copy executables
          Copy-Item qdl.exe $BuildDir
          Copy-Item qdl-ramdump.exe $BuildDir
          Copy-Item ks.exe $BuildDir

          $distDir = "dist"
          New-Item -ItemType Directory -Path $distDir | Out-Null

          $absPath = (Get-Location).Path
          $dlls = @("zlib1.dll", "libxml2-16.dll", "libusb-1.0.dll", "liblzma-5.dll", "libiconv-2.dll")

          foreach ($exe in @("qdl.exe", "qdl-ramdump.exe", "ks.exe")) {
            $filesXml = ""
            foreach ($dll in $dlls) {
              $filesXml += @"

            <File>
              <Type>3</Type>
              <Name>%DEFAULT FOLDER%\$dll</Name>
              <File>$absPath\$BuildDir\$dll</File>
              <ActiveX>false</ActiveX>
              <ActiveXInstall>false</ActiveXInstall>
              <Options>0</Options>
            </File>
          "@
            }

            $project = @"
          <?xml version="1.0" encoding="utf-8"?>
          <Project>
            <InputFile>$absPath\$BuildDir\$exe</InputFile>
            <OutputFile>$absPath\$distDir\$exe</OutputFile>
            <CompressFiles>true</CompressFiles>
            <DeleteExtractedOnExit>true</DeleteExtractedOnExit>
            <Files>$filesXml
            </Files>
          </Project>
          "@
            $projectFile = "$exe.evb"
            [System.IO.File]::WriteAllText($projectFile, $project, [System.Text.Encoding]::UTF8)

            Write-Host "Processing $exe..."
            & "C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe" $projectFile
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to process $exe"
              exit 1
            }
          }

          # Verify outputs
          Write-Host "Output files:"
          Get-ChildItem $distDir

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath qdl-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdl-windows-x64
          path: qdl-windows-x64.zip

  create-release:
    needs: [build-linux-static, build-linux-arm64-static, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/qdl-linux-x64-static/qdl-linux-x64-static.tar.gz
            artifacts/qdl-linux-arm64-static/qdl-linux-arm64-static.tar.gz
            artifacts/qdl-windows-x64/qdl-windows-x64.zip
          draft: false
          prerelease: false
